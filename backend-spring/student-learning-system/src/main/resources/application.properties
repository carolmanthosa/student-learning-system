# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/student_learning_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Manthosa@1956
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Flyway handles schema, not Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=your-very-secret-key-minimum-32-characters-long-for-security
app.jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
app.cors.allowed-origins=http://localhost:3000