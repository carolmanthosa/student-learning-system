# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/sls_springboot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Manthosa@1956
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Flyway handles schema, not Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=your-very-secret-key-minimum-32-characters-long-for-security
app.jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.enabled=true


# CORS
app.cors.allowed-origins=http://localhost:3000